<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Home OS</title>
    <style>
        :root { --matrix-green: #00ff41; }
        * { box-sizing: border-box; }
        body {
            background-color: #001a33;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                              url('https://images.unsplash.com/photo-1534088568595-a066f410bcda?auto=format&fit=crop&w=1000&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Courier New', monospace;
            margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }
        .system-monitor {
            display: grid; grid-template-columns: repeat(4, 1fr);
            background: rgba(0, 40, 0, 0.9); border-bottom: 2px solid var(--matrix-green);
            padding: 12px 5px; font-size: 0.8rem; text-align: center; gap: 5px;
        }
        .stat-label { color: #aaa; display: block; font-size: 0.6rem; margin-bottom: 2px; }
        .stat-value { color: var(--matrix-green); display: block; font-weight: 900; font-size: 1.1rem; }
        .world-clocks {
            display: flex; justify-content: space-around; background: rgba(0,0,0,0.7);
            padding: 10px 5px; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.2);
            font-weight: bold;
        }
        .clock-val { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
        h1 { text-align: center; font-size: 1.1rem; padding: 15px 0 5px 0; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .grid { flex: 1; display: grid; grid-template-rows: repeat(4, 1fr); align-items: center; justify-items: center; gap: 15px; padding: 10px; }
        .btn {
            width: 85%; max-width: 400px; height: 85%; border-radius: 45px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; font-weight: 900; font-size: 1.6rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); border: 3px solid rgba(255,255,255,0.1);
            transition: 0.2s; position: relative;
        }
        .off { background: rgba(20, 20, 20, 0.92); color: #777; }
        .on { background: #ffd700; color: #1a1a1a; border-color: #ccac00; box-shadow: 0 0 35px rgba(255, 215, 0, 0.6); }
        .timer-text { font-size: 0.85rem; font-weight: bold; color: #8b0000; margin-top: 5px; }
        .footer { width: 100%; background: rgba(0,0,0,0.85); padding: 15px 0 calc(env(safe-area-inset-bottom, 15px) + 15px); text-align: center; flex-shrink: 0; }
        .logout-btn { color: var(--matrix-green); text-decoration: none; font-size: 0.9rem; border: 1px solid var(--matrix-green); padding: 10px 35px; border-radius: 25px; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--matrix-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div class="system-monitor">
        <div><span class="stat-label">TEMP</span><span id="cpu-temp" class="stat-value">--</span></div>
        <div><span class="stat-label">LOAD</span><span id="cpu-load" class="stat-value">--</span></div>
        <div><span class="stat-label">VOLT</span><span id="volt-status" class="stat-value">--</span></div>
        <div><span class="stat-label">DISK</span><span id="disk-usage" class="stat-value">--</span></div>
    </div>
    <div class="world-clocks">
        <div>LDN <span id="clock-ldn" class="clock-val">--:--</span></div>
        <div>NYC <span id="clock-nyc" class="clock-val">--:--</span></div>
        <div>TYO <span id="clock-tyo" class="clock-val">--:--</span></div>
    </div>
    <h1>Home Control System</h1>
    <div class="grid">
        <a href="/toggle/heating" class="btn {{ 'on' if status['heating'] else 'off' }}" onclick="load()">
            HEATING <div id="heating-timer" class="timer-text"></div>
        </a>
        <a href="/toggle/light1" class="btn {{ 'on' if status['light1'] else 'off' }}" onclick="load()">LIGHT 1</a>
        <a href="/toggle/light2" class="btn {{ 'on' if status['light2'] else 'off' }}" onclick="load()">LIGHT 2</a>
        <a href="/toggle/light3" class="btn {{ 'on' if status['light3'] else 'off' }}" onclick="load()">LIGHT 3</a>
    </div>
    <footer class="footer"><a href="/logout" class="logout-btn">TERMINATE SESSION</a></footer>
    <script>
        function load() { document.getElementById('loader').style.display = 'flex'; }
        function updateClocks() {
            const opt = { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false };
            document.getElementById('clock-ldn').innerText = new Date().toLocaleTimeString('en-GB', {...opt, timeZone:'Europe/London'});
            document.getElementById('clock-nyc').innerText = new Date().toLocaleTimeString('en-GB', {...opt, timeZone:'America/New_York'});
            document.getElementById('clock-tyo').innerText = new Date().toLocaleTimeString('en-GB', {...opt, timeZone:'Asia/Tokyo'});
        }
        function updateStats() {
            fetch('/system_status').then(r => r.json()).then(d => {
                document.getElementById('cpu-temp').innerText = d.temp + "°C";
                document.getElementById('cpu-load').innerText = d.load;
                document.getElementById('disk-usage').innerText = d.disk;
                document.getElementById('volt-status').innerText = d.volt;
            });
            fetch('/heating_status').then(r => r.json()).then(d => {
                const el = document.getElementById('heating-timer');
                if (d.remaining > 0) {
                    let m = Math.floor(d.remaining / 60); let s = d.remaining % 60;
                    el.innerText = "AUTO-OFF: " + m + "m " + s + "s";
                } else { el.innerText = ""; }
            });
        }
        setInterval(updateClocks, 1000);
        setInterval(updateStats, 5000);
        updateClocks(); updateStats();

    </script>

<div style="margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; text-align: center;">
    <p style="font-size: 0.7rem; color: #666;">MAINTENANCE TOOLS</p>
    <button onclick="systemAction('reboot')" style="background:none; border: 1px solid #ffaa00; color:#ffaa00; padding: 5px 15px; border-radius: 5px; margin-right: 10px;">REBOOT</button>
    <button onclick="systemAction('shutdown')" style="background:none; border: 1px solid #ff4444; color:#ff4444; padding: 5px 15px; border-radius: 5px;">SHUTDOWN</button>
</div>

<script>
function systemAction(type) {
    let msg = type === 'reboot' ? "REBOOT SYSTEM?" : "SHUTDOWN SYSTEM?";
    if (confirm(msg)) {
        load(); // Show your spinner
        window.location.href = "/system/" + type;
    }
}
</script>

</body>
</html>
